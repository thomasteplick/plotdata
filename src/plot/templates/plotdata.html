<!DOCTYPE html>
<html lang="eng">
	<head>
		<title>"Plot Data"</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style type="text/css">
			div.grid {
				display: grid;
				grid-template-columns: repeat(100, 5px);
				grid-template-rows: repeat(100, 5px);
				width: 500px;
				height: 500px;
				border: 2px solid black;
			}
			
			.grid div:nth-child(1001), .grid div:nth-child(2001), .grid div:nth-child(3001), .grid div:nth-child(4001), .grid div:nth-child(5001), .grid div:nth-child(6001),
			.grid div:nth-child(7001), .grid div:nth-child(8001), .grid div:nth-child(9001) {
			border-bottom: 2px solid black;
			}

			.grid div:nth-child(9910), .grid div:nth-child(9920), .grid div:nth-child(9930), .grid div:nth-child(9940), .grid div:nth-child(9950), .grid div:nth-child(9960),
			.grid div:nth-child(9970), .grid div:nth-child(9980), .grid div:nth-child(9990) {
			border-left: 2px solid black;
			}

			.options input {
				display: inline;
			}

			label {
				font-size: 12px;
				font-family: Arial, Helvetica, sans-serif;
			}

			div.grid > div {
				margin: 0;
				padding: 0;
				border: 0;
				color: white;
				background-color: white;
			}

			div.grid > div.online {
				background-color: black;
				color: black;
			}

			div.xlabel-container {
				display: flex;
				flex-direction: row;
				width: 500px;
				flex: 0 0 50px;
				justify-content:space-evenly;
			}

			div.xlabel, div.ylabel {
				font-size: 10px;
				font-family: Arial, Helvetica, sans-serif;
			}

			div.ylabel {
				text-align: left;
			}

			form {
				width: 500px;
			}

		</style>
	</head>
	<body>
		<div class="ylabel">{{.Ymax}}</div>
		<div class="grid">
			{{range .Grid}}
				<div class="{{.}}">.</div>
			{{end}}
		</div>
		<div class="ylabel">{{.Ymin}}</div>
		<div class="xlabel-container">
			{{range .Xlabel}}
				<div class="xlabel">{{.}}</div>
			{{end}}
		</div>
		<form action="http://127.0.0.1:8080/plotdata" method="post">
			<fieldset>
				<legend>Plot Data</legend>
				<div class="options">
					<label for="filename">Filename</label>
					<input type="text" id="filename" name="filename" />
				</div>
				<input type="submit" value="Submit" />
				<input type="text" size="30" name="status" value="{{.Status}}" readonly />
			</fieldset>
		</form>
	</body>
</html>
